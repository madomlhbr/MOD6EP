{% extends "MyInventoryApp/base.html" %}

{% block content %}
<h2>Manage Account</h2>
    {% if message %}
        <div class="alert alert-{{ message_type|default:'success' }} text-center">
            {{ message }}
        </div>
    {% endif %}
<p><strong>Username:</strong> {{ account.username }}</p>

<div style="display:grid; gap:12px; max-width:320px;">
    <a href="{% url 'change_password' pk=account.pk %}" style="display:inline-block; padding:10px 16px; background:#2563eb; color:white; text-decoration:none; border-radius:8px; text-align:center;">Change Password</a>
    <a href="{% url 'delete_account' pk=account.pk %}" onclick="return confirm('Are you sure you want to delete your account?');" style="display:inline-block; padding:10px 16px; background:#dc2626; color:white; text-decoration:none; border-radius:8px; text-align:center;">Delete Account</a>
    <a href="{% url 'view_supplier' %}" style="display:inline-block; padding:10px 16px; background:#6b7280; color:white; text-decoration:none; border-radius:8px; text-align:center;">Back</a>
</div>
</div>
{% endblock %}
