{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-6 offset-md-3 border">
    <form method = "POST">
        {% csrf_token %}
        <div class="row my-3 mx-3">
            <h5 class="text-center"> SIGNUP </h5>
        </div>
        <div class="row mt-3 mx-3">
            <label class="form-label">Username:</label>
            <input type="text" id="username_" name="username_" class="form-control">
        </div>
        <div class="row mt-3 mx-3">
            <label class="form-label">Password:</label>
            <input type="password" id="password_" name="password_" class="form-control">
        </div>
        <div class="container text-center">
            <div class="row mt-3 mx-3">
                {% if messages %}
                    {% for message in messages %}
                        {% if "error" in message.tags %}
                            <p style="color: red;"> {{message}}</p>
                        {% endif %}
                    {% endfor %}
                {% endif %}
            </div>
            <div class="row mt-3 mx-3">
                <div class="col">
                    <button class="btn btn-primary" type="submit">Submit</button>
                </div>
                <div class="col">
                    <a class="btn btn-secondary" href="{% url 'login_page' %}" role="button">Back to Login</a>
                </div>
            </div>
        </div>
    </form>
    </div>
{% endblock %}
