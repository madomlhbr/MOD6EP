{% extends 'tapasapp/base.html' %}
{% load static %}



                {% block content %}
                <form method = "POST">
                {% csrf_token %}
                    <div class="col-md-6 offset-md-3 border">
                        <form method = "POST" action="{% url 'change_password' pk=accountNo.pk %}">
                            {% csrf_token %}
                            <div class="row my-3 mx-3">
                                <h5 class="text-center"> CHANGE PASSWORD </h5>
                            </div>

                            <div class="row mt-3 mx-3">
                                <label class="form-label">Old Password:</label>
                                <input type="password" id="passwordOLD" name="passwordOLD" class="form-control">
                            </div>

                            <div class="row mt-3 mx-3">
                                <label class="form-label">New Password:</label>
                                <input type="password" id="password_" name="password_" class="form-control">
                            </div>

                            <div class="row mt-3 mx-3">
                                <label class="form-label"> Confirm New Password:</label>
                                <input type="password" id="passwordCONFIRM" name="passwordCONFIRM" class="form-control">
                            </div>

                            <div class="container text-center">
                                <div class="row mt-3 mx-3"> <!-- for 3 kinds of message-->
                                    {% if messages %}
                                        {% for message in messages %}
                                            {% if "error" in message.tags %}
                                                <p> {{message}}</p>
                                            {% endif %}
                                        {% endfor %}
                                    {% endif %}
                                </div>

                                <div class="row my-3 mx-3">
                                    <div class="col">
                                        <button class="btn btn-success" type="submit" name="submitNewPassword">Confirm</button>
                                    </div>
                                    <div class="col">
                                        <button class="btn btn-danger" type="submit" name="goBackfromCP">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                        </div>
                {% endblock %}
