{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-6 offset-md-3 border">
    <form method = "POST" action="{% url 'manage_account' pk=accountNo.pk%}">
        {% csrf_token %}
        <div class="row my-3 mx-3">
            <h5 class="text-center"> MANAGE ACCOUNT </h5>
        </div>
        <div class="row mt-3 mx-3">
            <label class="form-label">Username:</label>
            <input type="text" id="username_" name="username_" class="form-control" value = "{{ accountNo.username }}" disabled>
        </div>
        <div class="container text-center">
            <div class="row mt-3 mx-3"> <!-- for change password message-->
                {% if messages %}
                    {% for message in messages %}
                        {% if "success" in message.tags %}
                            <p> {{message}}</p>
                        {% endif %}
                    {% endfor %}
                {% endif %}
            </div>
            <div class="row mt-3 mx-3">
                <div class="col">
                    <button class="btn btn-info" type="submit" name="change_password">Change Password</button>
                </div>
                <div class="col">
                    <button class="btn btn-danger" type="submit" name="delAccount">Delete Account</button>
                </div>
                <div class="col">
                    <button class="btn btn-secondary" type="submit" name="goBackfromMA">Go Back</button>
                </div>
            </div>
        </div>
    </form>
    </div>
{% endblock %}
