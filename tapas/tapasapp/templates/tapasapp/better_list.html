{% extends 'tapasapp/base.html' %}
{% load static %}



                {% block content %}
                <form method = "POST">
                {% csrf_token %}
                <div class = "row my-3 mx-3 text-center">
                    <div class="col">
                        <button class="btn btn-info" type="submit">Manage Account</button>
                    </div>
                    <div class="col">
                        <a class="btn btn-danger" href="{% url 'login_page' %}" role="button">Log Out</a>
                    </div>
                </div>
                </form>
                <div class="col-12">
                    <table class="table table-striped mb-5">
                        <thead>
                            <th scope="col"> Name </th>
                            <th scope="col"> Cooking Time </th>
                            <th scope="col"> Prep Time </th>
                            <th scope="col">  </th>
                        </thead>
                        <tbody>
                            {% for d in dishes %}
                            <tr>
                                <td> {{ d.name }} </td>
                                <td> {{ d.prep_time }} </td>
                                <td> {{ d.cook_time }} </td>
                                <td><a href="{% url 'view_detail' pk=d.pk %}"  class="btn btn-dark">Details</button></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                {% endblock %}
